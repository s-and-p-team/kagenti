apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshell-sandbox
  namespace: {{ .Values.tenant }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
---
{{- if eq .Values.ingress.type "route" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshell-sandbox-scc-{{ .Values.tenant }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: openshell-sandbox
    namespace: {{ .Values.tenant }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openshell-gateway
  namespace: {{ .Values.tenant }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
rules:
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods", "events", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  # Secrets: create-only — gateway provisions per-sandbox credentials but does not
  # rotate or delete them (sandbox controller handles cleanup).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshell-gateway
  namespace: {{ .Values.tenant }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openshell-gateway
subjects:
  - kind: ServiceAccount
    name: openshell-gateway
    namespace: {{ .Values.tenant }}
