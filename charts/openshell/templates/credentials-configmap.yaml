apiVersion: v1
kind: ConfigMap
metadata:
  name: openshell-credentials-config
  namespace: {{ .Values.tenant }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
data:
  credentials.yaml: |
    credentials:
      placeholder:
        client_id: {{ .Values.tenant }}-placeholder
        client_secret_ref: placeholder-secret
        token_endpoint: {{ .Values.oidc.issuer }}/protocol/openid-connect/token
        scopes: []
