apiVersion: v1
kind: Service
metadata:
  name: openshell-server
  namespace: {{ .Values.tenant }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 8080
      targetPort: grpc
      protocol: TCP
  selector:
    {{- include "openshell.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
