apiVersion: v1
kind: LimitRange
metadata:
  name: sandbox-defaults
  namespace: {{ .Values.tenant }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: {{ .Values.quota.defaultRequestCpu | quote }}
        memory: {{ .Values.quota.defaultRequestMemory | quote }}
