# This template configures the agent namespaces based on the list provided in values.yaml.
# For each namespace, it creates the namespace itself, applies necessary labels,
# and creates secrets for GitHub, OpenAI, and Slack.
{{- if .Values.agentNamespaces }}
{{- $root := . }}
{{- range $root.Values.agentNamespaces }}
---
# ——————————————————————————————————————————————————————————————————————————————
#  Namespace: {{ . }}
#  Creates the namespace and applies Istio/Gateway labels.
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: v1
kind: Namespace
metadata:
  name: {{ . }}
  labels:
    kagenti-enabled: "true"
    istio-discovery: enabled
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: waypoint
    shared-gateway-access: "true"
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
  {{- include "kagenti.labels" $root | nindent 4 }}
---
# ——————————————————————————————————————————————————————————————————————————————
#  Secrets for Namespace: {{ . }}
# ——————————————————————————————————————————————————————————————————————————————
{{- if and $.Values.secrets.githubUser $.Values.secrets.githubToken }}
# 1. GitHub Token Secret (for general use — only created when GitHub credentials are provided)
apiVersion: v1
kind: Secret
metadata:
  name: github-token-secret
  namespace: {{ . }}
  labels:
    {{- include "kagenti.labels" $root | nindent 4 }}
type: Opaque
stringData:
  user: {{ $.Values.secrets.githubUser | quote }}
  token: {{ $.Values.secrets.githubToken | quote }}
---
# 2. GitHub Shipwright Secret (for Shipwright Build git clone)
#    Shipwright requires kubernetes.io/basic-auth type with username/password fields
apiVersion: v1
kind: Secret
metadata:
  name: github-shipwright-secret
  namespace: {{ . }}
  labels:
    {{- include "kagenti.labels" $root | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ $.Values.secrets.githubUser | quote }}
  password: {{ $.Values.secrets.githubToken | quote }}
---
# 3. GHCR Docker Registry Secret (for pulling private images)
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: {{ . }}
  labels:
    {{- include "kagenti.labels" $root | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ (printf "{\"auths\":{\"ghcr.io\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" $.Values.secrets.githubUser $.Values.secrets.githubToken (printf "%s:%s" $.Values.secrets.githubUser $.Values.secrets.githubToken | b64enc)) | b64enc }}
---
{{ end }}
# 4. OpenAI API Key Secret
apiVersion: v1
kind: Secret
metadata:
  name: openai-secret
  namespace: {{ . }}
  labels:
    {{- include "kagenti.labels" $root | nindent 4 }}
type: Opaque
stringData:
  apikey: {{ $.Values.secrets.openaiApiKey | quote }}
---
# 5. Slack Bot Tokens Secret
apiVersion: v1
kind: Secret
metadata:
  name: slack-secret
  namespace: {{ . }}
  labels:
    {{- include "kagenti.labels" $root | nindent 4 }}
type: Opaque
stringData:
  bot-token: {{ $.Values.secrets.slackBotToken | quote }}
  admin-bot-token: {{ $.Values.secrets.adminSlackBotToken | quote }}
---
# 6. Quay.io Docker Registry Secret (for pushing images)
apiVersion: v1
kind: Secret
metadata:
  name: quay-registry-secret
  namespace: {{ . }}
  labels:
    {{- include "kagenti.labels" $root | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ (printf "{\"auths\":{\"quay.io\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" $.Values.secrets.quayUser $.Values.secrets.quayToken (printf "%s:%s" $.Values.secrets.quayUser $.Values.secrets.quayToken | b64enc)) | b64enc }}
---
{{- if not $root.Values.keycloak.adminExistingSecret }}
# ——————————————————————————————————————————————————————————————————————————————
#  Secret for Keycloak Admin Credentials in Namespace: {{ . }}
#  Used by the client-registration sidecar to register agents as OAuth clients.
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
  namespace: {{ . }}
  labels:
    {{- include "kagenti.labels" $root | nindent 4 }}
type: Opaque
stringData:
  KEYCLOAK_ADMIN_USERNAME: {{ $root.Values.keycloak.adminUsername | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ $root.Values.keycloak.adminPassword | quote }}
---
{{- end }}

# ——————————————————————————————————————————————————————————————————————————————
#  ConfigMap for AuthBridge in Namespace: {{ . }}
#  Consolidated config consumed by injected sidecars:
#  - kagenti-webhook (injects CLIENT_AUTH_TYPE, SPIFFE_IDP_ALIAS, JWT_AUDIENCE into client-registration)
#  - client-registration sidecar (reads KEYCLOAK_URL, KEYCLOAK_REALM, CLIENT_AUTH_TYPE, SPIFFE_IDP_ALIAS, JWT_AUDIENCE)
#  - envoy-proxy go-processor (reads ISSUER, EXPECTED_AUDIENCE for inbound JWT validation)
#
#  NOTE: KEYCLOAK_NAMESPACE is NOT used by injected sidecars (credentials come from
#  local keycloak-admin-secret, replicated to this namespace by agent-oauth-secret Job).
#  KEYCLOAK_NAMESPACE is only used by Helm-hook Jobs (spiffe-idp-setup, agent-oauth-secret)
#  that run at install time with cross-namespace RBAC to read from the Keycloak namespace.
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: v1
kind: ConfigMap
metadata:
  name: authbridge-config
  namespace: {{ . }}
data:
  # Keycloak connection (used by client-registration sidecar)
  KEYCLOAK_URL: "http://keycloak-service.{{ $root.Values.keycloak.namespace }}.svc:8080"
  KEYCLOAK_REALM: {{ $root.Values.keycloak.realm | quote }}
  # KEYCLOAK_NAMESPACE: Not used by sidecars. Included for reference by Helm-hook Jobs.
  # Sidecars get credentials from local keycloak-admin-secret (replicated by agent-oauth-secret Job).
  KEYCLOAK_NAMESPACE: "{{ $root.Values.keycloak.namespace }}"
  # ISSUER: Used by envoy-proxy go-processor for inbound JWT validation.
  # Optional - auto-derived from KEYCLOAK_URL + KEYCLOAK_REALM if not set.
  # Set explicitly when the internal KEYCLOAK_URL differs from the frontend URL
  # that appears in token "iss" claims (split-horizon DNS).
  ISSUER: "{{ $root.Values.keycloak.publicUrl }}/realms/{{ $root.Values.keycloak.realm }}"
  SPIRE_ENABLED: {{ if $root.Values.spire.enabled }}"true"{{ else }}"false"{{ end }}
  # Authentication configuration (used by webhook injector and client-registration)
  CLIENT_AUTH_TYPE: "{{ $root.Values.authBridge.clientAuthType }}"
  SPIFFE_IDP_ALIAS: "{{ $root.Values.authBridge.spiffeIdpAlias }}"
  JWT_AUDIENCE: "{{ $root.Values.keycloak.publicUrl }}/realms/{{ $root.Values.keycloak.realm }}"
  # EXPECTED_AUDIENCE: Read by authbridge-unified ext_proc (envoy-proxy sidecar)
  # for inbound JWT "aud" claim validation. Must match the audience mapper value
  # configured in Keycloak (kagenti-platform-audience scope).
  EXPECTED_AUDIENCE: "{{ $root.Values.keycloak.publicUrl }}/realms/{{ $root.Values.keycloak.realm }}"
  CREDENTIAL_WAIT_TIMEOUT: {{ $root.Values.authBridge.credentialWaitTimeout | quote }}
---
# ——————————————————————————————————————————————————————————————————————————————
#  ConfigMap for Envoy in Namespace: {{ . }}
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: {{ . }}
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          protocol: TCP
          address: 127.0.0.1
          port_value: 9901

    static_resources:
      listeners:
      - name: outbound_listener
        address:
          socket_address:
            protocol: TCP
            address: 0.0.0.0
            port_value: 15123
        listener_filters:
        - name: envoy.filters.listener.original_dst
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.original_dst.v3.OriginalDst
        - name: envoy.filters.listener.tls_inspector
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.tls_inspector.v3.TlsInspector
        filter_chains:
        # TLS passthrough: forward HTTPS traffic as-is via TCP proxy
        - filter_chain_match:
            transport_protocol: tls
          filters:
          - name: envoy.filters.network.tcp_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
              stat_prefix: outbound_tls_passthrough
              cluster: original_destination
        # Plaintext HTTP: inspect and process via ext_proc
        - filter_chain_match:
            transport_protocol: raw_buffer
          filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: outbound_http
              codec_type: AUTO
              route_config:
                name: outbound_routes
                virtual_hosts:
                - name: catch_all
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: original_destination
                      timeout: 300s
              http_filters:
              - name: envoy.filters.http.ext_proc
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                  grpc_service:
                    envoy_grpc:
                      cluster_name: ext_proc_cluster
                    timeout: 300s
                  allow_mode_override: true
                  processing_mode:
                    request_header_mode: SEND
                    response_header_mode: SEND
                    request_body_mode: NONE
                    response_body_mode: NONE
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      - name: inbound_listener
        address:
          socket_address:
            protocol: TCP
            address: 0.0.0.0
            port_value: 15124
        listener_filters:
        - name: envoy.filters.listener.original_dst
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.original_dst.v3.OriginalDst
        filter_chains:
        # AuthBridge config and stats passthrough
        - filter_chain_match:
            destination_port: 9093
          filters:
          - name: envoy.filters.network.tcp_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
              stat_prefix: outbound_passthrough_9093
              cluster: original_destination
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: inbound_http
              codec_type: AUTO
              route_config:
                name: inbound_routes
                virtual_hosts:
                - name: local_app
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: original_destination
                      timeout: 300s
              http_filters:
              # Lua filter injects x-authbridge-direction BEFORE ext_proc runs.
              # Route-level request_headers_to_add does not work because the
              # router filter runs after ext_proc.
              - name: envoy.filters.http.lua
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                  inline_code: |
                    function envoy_on_request(request_handle)
                      request_handle:headers():add("x-authbridge-direction", "inbound")
                    end
              - name: envoy.filters.http.ext_proc
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                  grpc_service:
                    envoy_grpc:
                      cluster_name: ext_proc_cluster
                    timeout: 300s
                  allow_mode_override: true
                  processing_mode:
                    request_header_mode: SEND
                    response_header_mode: SEND
                    request_body_mode: NONE
                    response_body_mode: NONE
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
      - name: original_destination
        connect_timeout: 30s
        type: ORIGINAL_DST
        lb_policy: CLUSTER_PROVIDED
        original_dst_lb_config:
          use_http_header: false

      - name: ext_proc_cluster
        connect_timeout: 5s
        type: STATIC
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        load_assignment:
          cluster_name: ext_proc_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 9090
---
# ——————————————————————————————————————————————————————————————————————————————
#  ConfigMap for AuthBridge in Namespace: {{ . }}
#  YAML config for the authbridge binary (cmd/authbridge).
#  Supports envoy-sidecar and proxy-sidecar modes. The mode is selected
#  by the operator via annotation; listener addresses are injected as env
#  vars and expanded via ${...} at startup.
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: v1
kind: ConfigMap
metadata:
  name: authbridge-runtime-config
  namespace: {{ . }}
  labels:
    {{- include "kagenti.labels" $root | nindent 4 }}
data:
  # Per-plugin config. Plugin-level defaults (audience_file,
  # bypass_paths, identity file paths, etc.) are applied by the
  # authbridge binary itself — see
  # authbridge/authlib/plugins/CONVENTIONS.md in kagenti-extensions.
  config.yaml: |
    mode: envoy-sidecar
    pipeline:
      inbound:
        plugins:
          - name: jwt-validation
            config:
              # `issuer` carries the PUBLIC Keycloak URL because that is what
              # Keycloak stamps into the `iss` claim of issued tokens (must
              # match bit-for-bit for validation to pass).
              issuer: "{{ $root.Values.keycloak.publicUrl }}/realms/{{ $root.Values.keycloak.realm }}"
              # `keycloak_url` + `keycloak_realm` let jwt-validation derive
              # `jwks_url` from the INTERNAL Keycloak URL — the sidecar
              # actually fetches JWKS from inside the cluster, and the
              # public hostname (in `issuer`) typically resolves to
              # 127.0.0.1 via the localtest.me wildcard. Mirrors the pair
              # already passed to token-exchange below. See
              # kagenti-extensions#383.
              keycloak_url: "http://keycloak-service.{{ $root.Values.keycloak.namespace }}.svc:8080"
              keycloak_realm: {{ $root.Values.keycloak.realm | quote }}
      outbound:
        plugins:
          - name: token-exchange
            config:
              keycloak_url: "http://keycloak-service.{{ $root.Values.keycloak.namespace }}.svc:8080"
              keycloak_realm: {{ $root.Values.keycloak.realm | quote }}
              default_policy: "passthrough"
              identity:
                # Map Helm clientAuthType to authbridge identity.type:
                #   "client-secret"  → "client-secret" (traditional)
                #   "federated-jwt"  → "spiffe" (SPIFFE JWT-SVID authentication)
                type: {{ eq $root.Values.authBridge.clientAuthType "federated-jwt" | ternary "spiffe" $root.Values.authBridge.clientAuthType | quote }}
---
{{- if $.Values.openshift }}
# ——————————————————————————————————————————————————————————————————————————————
#  SCC RoleBinding for Pipeline SA in Namespace: {{ . }}
#  Grants privileged SCC to the pipeline service account for buildah builds.
#  Buildah requires SETUID/SETGID capabilities which only privileged SCC provides.
#  Note: RoleBindings are idempotent - safe to apply even if already exists.
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-privileged-scc
  namespace: {{ . }}
  labels:
    {{- include "kagenti.labels" $root | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: {{ . }}
---
# ——————————————————————————————————————————————————————————————————————————————
#  SCC RoleBinding for AuthBridge in Namespace: {{ . }}
#  Grants the kagenti-authbridge custom SCC to all service accounts so that
#  the webhook-injected AuthBridge stack can run:
#    - proxy-init init container (NET_ADMIN/NET_RAW, root) for iptables
#    - envoy-proxy sidecar (UID 1337)
#    - spiffe-helper / client-registration sidecars (UID 1000)
#  Agent SAs are created dynamically by the operator (name = agent name),
#  so we use the namespace service accounts group.
#
#  Requires kagenti-extensions#234 (webhook uses capabilities instead of
#  privileged mode). Use --extensions-ref to test:
#    /run-e2e --extensions-ref fix/proxy-init-drop-privileged
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-authbridge-scc
  namespace: {{ . }}
  labels:
    {{- include "kagenti.labels" $root | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:kagenti-authbridge
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: system:serviceaccounts:{{ . }}
{{- end }}
{{- end }}
{{- end }}
