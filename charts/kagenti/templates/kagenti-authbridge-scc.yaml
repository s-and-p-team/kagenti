{{- if $.Values.openshift }}
# ——————————————————————————————————————————————————————————————————————————————
#  Custom SCC for AuthBridge sidecars in agent namespaces.
#
#  The kagenti-webhook injects an AuthBridge sidecar stack into agent pods:
#    - proxy-init (init): iptables interception (needs NET_ADMIN/NET_RAW, root, non-privileged)
#    - envoy-proxy (sidecar): Envoy for auth token injection (requests UID 1337)
#    - authbridge-light (sidecar): OAuth token management (no hardcoded UID)
#    - spiffe-helper (sidecar): SPIRE identity (UBI image, no hardcoded UID)
#
#  This SCC grants the minimum permissions needed for AuthBridge sidecars:
#    - proxy-init needs root + NET_ADMIN/NET_RAW capabilities (not privileged mode)
#    - envoy-proxy requests UID 1337 (for iptables exclusion coordination)
#    - authbridge-light and spiffe-helper run as image-default UIDs (no override)
#  RunAsAny is required because proxy-init needs root and envoy needs UID 1337.
#  Bound to agent namespaces via the `groups` field below.
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: kagenti-authbridge
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
groups:
{{- range $.Values.agentNamespaces }}
  - system:serviceaccounts:{{ . }}
{{- end }}
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
# proxy-init uses NET_ADMIN/NET_RAW capabilities (not privileged mode).
allowPrivilegedContainer: false
# proxy-init needs privilege escalation for iptables; other sidecars set false.
allowPrivilegeEscalation: true
allowedCapabilities:
  - NET_ADMIN
  - NET_RAW
defaultAddCapabilities: []
requiredDropCapabilities:
  - MKNOD
fsGroup:
  type: RunAsAny
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
seccompProfiles:
  - runtime/default
volumes:
  - configMap
  - csi
  - downwardAPI
  - emptyDir
  - ephemeral
  - persistentVolumeClaim
  - projected
  - secret
---
# ——————————————————————————————————————————————————————————————————————————————
#  ClusterRole granting "use" on the kagenti-authbridge SCC.
#  OpenShift auto-creates ClusterRoles for built-in SCCs but may not do so
#  reliably for custom SCCs. Create it explicitly so RoleBindings work.
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:openshift:scc:kagenti-authbridge
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
rules:
  - apiGroups: ["security.openshift.io"]
    resources: ["securitycontextconstraints"]
    resourceNames: ["kagenti-authbridge"]
    verbs: ["use"]
{{- end }}
