{{- if .Values.components.otel.enabled }}
{{- /* Create ConfigMap for OpenShift trusted CA bundle injection */}}
{{- if and $.Values.openshift $.Values.components.mlflow.enabled $.Values.mlflow.auth.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-trusted-cabundle
  namespace: {{ .Release.Namespace }}
  labels:
    # OpenShift injects trusted CA bundle into ConfigMaps with this label
    config.openshift.io/inject-trusted-cabundle: "true"
    {{- include "kagenti.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
    # Retain on helm uninstall: OpenShift asynchronously injects the trusted CA bundle
    # into this ConfigMap. Deleting it causes a race on reinstall where the OTel collector
    # mounts an empty ConfigMap before OpenShift re-injects the CAs, breaking TLS verification.
    "helm.sh/resource-policy": keep
data: {}
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app: otel-collector
    {{- include "kagenti.labels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app: otel-collector
    {{- include "kagenti.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: otel-collector
          image: {{ .Values.otel.collector.image.repository }}:{{ .Values.otel.collector.image.tag }}
          command:
          - /otelcol-contrib
          - --config=/etc/otelcol-config/base.yaml
          - --set
          - receivers::otlp::protocols::http::endpoint=0.0.0.0:8335
          {{- if and $.Values.components.mlflow.enabled $.Values.mlflow.auth.enabled }}
          # TODO: OAuth tokens are required because MLflow's mlflow-oidc-auth plugin doesn't support
          # mTLS/mesh authentication. The plugin only validates OIDC tokens, not client certificates.
          # This means the otel-collector can't use Istio Ambient mesh identity to push traces to MLflow.
          # The secret is created by mlflow-oauth-secret-job in the kagenti chart (installed after kagenti-deps).
          # If otel-collector starts before the secret exists, it will start with empty credentials.
          # Restart the otel-collector deployment after kagenti chart installs to pick up the credentials.
          env:
            - name: MLFLOW_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.mlflow.auth.secretName | default "mlflow-oauth-secret" }}
                  key: OIDC_CLIENT_ID
                  optional: true
            - name: MLFLOW_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.mlflow.auth.secretName | default "mlflow-oauth-secret" }}
                  key: OIDC_CLIENT_SECRET
                  optional: true
            - name: KEYCLOAK_TOKEN_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.mlflow.auth.secretName | default "mlflow-oauth-secret" }}
                  key: OIDC_TOKEN_URL
                  optional: true
          {{- end }}
          volumeMounts:
            - name: otel-collector-config
              mountPath: /etc/otelcol-config
            {{- if and $.Values.openshift $.Values.components.mlflow.enabled $.Values.mlflow.auth.enabled }}
            - name: trusted-ca
              mountPath: /etc/pki/ca-trust/extracted/pem
              readOnly: true
            - name: ingress-ca
              mountPath: /etc/pki/ingress-ca
              readOnly: true
            {{- end }}
          ports:
            - containerPort: 4317
              name: otlp-grpc
              protocol: TCP
            - containerPort: 4318
              name: otlp-http
              protocol: TCP
            - containerPort: 8335
              name: otlp-receiver
              protocol: TCP
      volumes:
        - name: otel-collector-config
          configMap:
            name: otel-collector-config
        {{- if and $.Values.openshift $.Values.components.mlflow.enabled $.Values.mlflow.auth.enabled }}
        # OpenShift trusted CA bundle — created by Tekton/platform operators.
        # Optional so the pod starts while waiting for the ConfigMap to appear.
        - name: trusted-ca
          configMap:
            name: config-trusted-cabundle
            optional: true
            items:
              - key: ca-bundle.crt
                path: tls-ca-bundle.pem
        # OpenShift ingress CA for Keycloak JWKS verification via ingress route
        # Copied from openshift-config-managed/default-ingress-cert by pre-install Job
        - name: ingress-ca
          configMap:
            name: otel-ingress-ca
            items:
              - key: ca-bundle.crt
                path: ingress-ca.pem
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app: otel-collector
    {{- include "kagenti.labels" . | nindent 4 }}
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318
    - name: otlp-receiver
      protocol: TCP
      port: 8335
      targetPort: 8335
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
data:
  base.yaml: |
    {{- include "kagenti.otel.collectorConfig" . | nindent 4 }}
{{- end }}
