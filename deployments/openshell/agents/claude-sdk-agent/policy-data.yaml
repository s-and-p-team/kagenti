version: 1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /lib64
    - /etc
    - /home
    - /bin
    - /sbin
  read_write:
    - /tmp
    - /app
    - /root
    - /var/log
process:
  run_as_user: ""
  run_as_group: ""
network_policies:
  internal:
    name: "Allow internal cluster services"
    endpoints:
      - host: "*.svc.cluster.local"
        port: 8080
      - host: "*.svc.cluster.local"
        port: 8000
      - host: "*.svc.cluster.local"
        port: 4000
      - host: "*.svc.cluster.local"
        port: 443
  litemaas:
    name: "Allow LiteMaaS LLM endpoint"
    endpoints:
      - host: "*.redhatworkshops.io"
        port: 443
      - host: "*.rh-aiservices-bu.com"
        port: 443
