# ADK agent with OpenShell supervisor — Tier 2 (LLM + security)
# Tests skill execution under full supervisor security layers
#
# Policy ConfigMap created by fulltest script from:
#   policy-data.yaml (sandbox config)
#   sandbox-policy.rego (OPA rules)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adk-agent-supervised
  namespace: team1
  labels:
    kagenti.io/type: agent
    app.kubernetes.io/name: adk-agent-supervised
    app.kubernetes.io/managed-by: openshell
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: adk-agent-supervised
  template:
    metadata:
      labels:
        kagenti.io/type: agent
        kagenti.io/inject: disabled
        app.kubernetes.io/name: adk-agent-supervised
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: openshell-supervisor
      containers:
      - name: agent
        image: adk-agent-supervised:latest
        imagePullPolicy: IfNotPresent
        command: ["/usr/local/bin/openshell-sandbox"]
        args:
        - "--policy-rules"
        - "/etc/openshell/sandbox-policy.rego"
        - "--policy-data"
        - "/etc/openshell/policy.yaml"
        - "--log-level"
        - "info"
        - "--"
        - "python"
        - "agent.py"
        securityContext:
          privileged: true
        env:
        - name: AGENT_NAME
          value: "adk-agent-supervised"
        - name: PORT
          value: "8080"
        - name: HOST
          value: "0.0.0.0"
        - name: LLM_MODEL
          value: "openai/gpt-4o-mini"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-virtual-keys
              key: api-key
        - name: OPENAI_API_BASE
          value: "http://litellm-model-proxy.team1.svc:4000/v1"
        volumeMounts:
        - name: policy
          mountPath: /etc/openshell
          readOnly: true
        - name: tmp
          mountPath: /tmp
      # Bridges traffic from the pod network (default netns) into the
      # supervisor's isolated network namespace where the agent listens.
      - name: port-bridge
        image: python:3.12-slim
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        command: ["python3", "-c"]
        args:
        - |
          import socket, threading
          def forward(src, dst):
              try:
                  while d := src.recv(4096):
                      dst.sendall(d)
              except: pass
              finally: src.close(); dst.close()
          srv = socket.socket(); srv.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          srv.bind(('0.0.0.0', 8080)); srv.listen(32)
          while True:
              c, _ = srv.accept()
              u = socket.socket(); u.connect(('10.200.0.2', 8080))
              threading.Thread(target=forward, args=(c, u), daemon=True).start()
              threading.Thread(target=forward, args=(u, c), daemon=True).start()
        ports:
        - containerPort: 8080
      volumes:
      - name: policy
        configMap:
          name: adk-agent-supervised-policy
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: adk-agent-supervised
  namespace: team1
spec:
  selector:
    app.kubernetes.io/name: adk-agent-supervised
  ports:
  - port: 8080
    targetPort: 8080
