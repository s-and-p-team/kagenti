# OpenShell TLS Secrets (Placeholder)
#
# For PoC: the gateway runs with --disable-tls --disable-gateway-auth,
# so these secrets are NOT required. Istio ambient mTLS secures in-mesh traffic.
#
# For production: generate self-signed certs and populate the Secret below,
# then remove --disable-tls and --disable-gateway-auth from gateway.yaml.
#
# Generate self-signed certs:
#
#   # Create CA
#   openssl req -x509 -newkey rsa:4096 -days 365 -nodes \
#     -keyout ca-key.pem -out ca-cert.pem \
#     -subj "/CN=OpenShell CA"
#
#   # Create server cert
#   openssl req -newkey rsa:4096 -nodes \
#     -keyout server-key.pem -out server-req.pem \
#     -subj "/CN=openshell.openshell-system.svc.cluster.local"
#
#   openssl x509 -req -in server-req.pem -days 365 \
#     -CA ca-cert.pem -CAkey ca-key.pem -CAcreateserial \
#     -out server-cert.pem \
#     -extfile <(printf "subjectAltName=DNS:openshell.openshell-system.svc.cluster.local,DNS:openshell,DNS:localhost")
#
#   # Create the secret
#   kubectl create secret tls openshell-tls \
#     --cert=server-cert.pem --key=server-key.pem \
#     -n openshell-system
#
#   kubectl create secret generic openshell-ca \
#     --from-file=ca.crt=ca-cert.pem \
#     -n openshell-system
#
---
apiVersion: v1
kind: Secret
metadata:
  name: openshell-tls
  namespace: openshell-system
  labels:
    app.kubernetes.io/name: openshell-gateway
    app.kubernetes.io/part-of: kagenti
    app.kubernetes.io/component: openshell
type: kubernetes.io/tls
data:
  # Replace with base64-encoded cert and key for production use.
  # For PoC, this secret is not mounted (gateway runs with --disable-tls).
  tls.crt: ""
  tls.key: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: openshell-ca
  namespace: openshell-system
  labels:
    app.kubernetes.io/name: openshell-gateway
    app.kubernetes.io/part-of: kagenti
    app.kubernetes.io/component: openshell
type: Opaque
data:
  # Replace with base64-encoded CA cert for production use.
  ca.crt: ""
