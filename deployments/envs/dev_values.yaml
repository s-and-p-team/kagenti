# Kagenti dev installation configuration


####################################################################
# kagenti-deps
####################################################################
gatewayApi:
  enabled: true

certManager:
  enabled: true

tekton:
  enabled: true

shipwright:
  enabled: true

kiali:
  enabled: true

charts:
  ####################################################################
  # kagenti-deps
  ####################################################################
  kagenti-deps:
    enabled: true
    values:
      openshift: false
      components:
        keycloak:
          enabled: true
        otel:
          enabled: true
        phoenix:
          enabled: false
        mlflow:
          enabled: true
        mcpInspector:
          enabled: true
        metricsServer:
          enabled: true
        containerRegistry:
          enabled: true
        ingressGateway:
          enabled: true
        kiali:
          enabled: true
        spire:
          enabled: true

  ####################################################################
  # kagenti
  ####################################################################
  kagenti:
    enabled: true
    values:
      openshift: false
      components:
        agentNamespaces:
          enabled: true
        platformOperator:
          enabled: true
        kagentiOperator:
          enabled: false  # Disabled to avoid ConfigMap collision with platformOperator
        ui:
          enabled: true
        # additional artifacts required by MCP gateway
        mcpGateway:
          enabled: true
        phoenix:
          enabled: false
      # configs
      ui:
        auth:
          enabled: true
      # MLflow auth disabled for Kind (no Keycloak OAuth needed locally)
      mlflow:
        auth:
          enabled: false

  ####################################################################
  # istio  - required for the ingress gateway
  ####################################################################
  istio:
    enabled: true

  ####################################################################
  # mcp-gateway
  ####################################################################
  mcpGateway:
    enabled: true

  ####################################################################
  # kuadrant operator - AuthPolicy for MCP Gateway
  ####################################################################
  kuadrant:
    enabled: true

  ####################################################################
  # spire
  ####################################################################
  spire:
    enabled: true
    version: "0.28.4"
    crd:
      version: "0.5.0"
    values:
      global:
        spire:
          jwtIssuer: "spiffe://localtest.me"
      # Configure SPIFFE OIDC Discovery Provider to include "use" field in JWKS
      # This is required for Keycloak SPIFFE provider compatibility
      spiffe-oidc-discovery-provider:
        config:
          set_key_use: true
      # CRITICAL: Set JWT TTL to 5 minutes for Keycloak compatibility
      # Keycloak rejects JWTs older than ~3 minutes. With 5-minute TTL,
      # SPIRE refreshes every ~2.5 minutes, keeping JWTs fresh enough.
      spire-server:
        controllerManager:
          identities:
            clusterSPIFFEIDs:
              default:
                jwtTTL: "5m"

kind_images_preload: false
# docker or podman
container_engine: docker

####################################################################
# RHOAI (Red Hat OpenShift AI)
####################################################################
rhoai:
  enabled: false
