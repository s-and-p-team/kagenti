---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-budget-proxy
  namespace: team1
  labels:
    app.kubernetes.io/name: llm-budget-proxy
    app.kubernetes.io/part-of: kagenti
    app.kubernetes.io/managed-by: kagenti-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-budget-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-budget-proxy
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: proxy
        image: image-registry.openshift-image-registry.svc:5000/team1/llm-budget-proxy:v0.0.1
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: LITELLM_URL
          value: "http://litellm-proxy.kagenti-system.svc.cluster.local:4000"
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-sessions-secret
              key: password
        - name: DATABASE_URL
          value: "postgresql://kagenti:$(PGPASSWORD)@postgres-sessions.team1.svc:5432/llm_budget"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: llm-budget-proxy
  namespace: team1
  labels:
    app.kubernetes.io/name: llm-budget-proxy
    app.kubernetes.io/part-of: kagenti
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: llm-budget-proxy
  ports:
  - name: http
    port: 8080
    targetPort: 8080
